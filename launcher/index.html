<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fixture Roleplay Bot Launcher</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0d0f17;
            --surface: #12151f;
            --surface2: #181b28;
            --border: #1e2235;
            --accent: #5865f2;
            --accent-hover: #4752c4;
            --green: #23a55a;
            --red: #ed4245;
            --yellow: #fee75c;
            --text: #e3e5ea;
            --text-muted: #72767d;
            --radius: 10px;
        }

        html,
        body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            -webkit-app-region: no-drag;
            overflow: hidden;
            user-select: none;
        }

        /* ── Titlebar ──────────────────────────── */
        .titlebar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            height: 40px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            -webkit-app-region: drag;
        }

        .titlebar-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 13px;
            letter-spacing: .4px;
            color: var(--text);
        }

        .titlebar-logo .emoji {
            font-size: 16px;
        }

        .titlebar-actions {
            display: flex;
            gap: 6px;
            -webkit-app-region: no-drag;
        }

        .titlebar-btn {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            font-size: 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background .15s, color .15s;
        }

        .titlebar-btn:hover {
            background: var(--border);
            color: var(--text);
        }

        .titlebar-btn.close:hover {
            background: var(--red);
            color: #fff;
        }

        /* ── Layout ────────────────────────────── */
        .app {
            display: grid;
            grid-template-rows: 1fr;
            grid-template-columns: 240px 1fr;
            height: calc(100vh - 40px);
        }

        /* ── Sidebar ────────────────────────────── */
        .sidebar {
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 20px 16px;
            gap: 24px;
        }

        .status-card {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .status-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: .8px;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            font-weight: 600;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--red);
            box-shadow: 0 0 8px var(--red);
            transition: background .4s, box-shadow .4s;
            flex-shrink: 0;
        }

        .status-dot.online {
            background: var(--green);
            box-shadow: 0 0 10px var(--green);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: .5;
            }
        }

        #status-text {
            transition: color .4s;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .btn {
            width: 100%;
            padding: 10px 16px;
            border-radius: 8px;
            border: none;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: transform .1s, opacity .2s, background .2s;
        }

        .btn:active {
            transform: scale(.97);
        }

        .btn:disabled {
            opacity: .35;
            cursor: not-allowed;
            transform: none;
        }

        .btn-start {
            background: var(--green);
            color: #fff;
        }

        .btn-start:hover:not(:disabled) {
            background: #1e9150;
        }

        .btn-stop {
            background: #2a1519;
            color: var(--red);
            border: 1px solid #3d1e22;
        }

        .btn-stop:hover:not(:disabled) {
            background: #3d1e22;
        }

        .btn-clear {
            background: var(--surface2);
            color: var(--text-muted);
            border: 1px solid var(--border);
            margin-top: 4px;
        }

        .btn-clear:hover {
            background: var(--border);
            color: var(--text);
        }

        .info-block {
            border-top: 1px solid var(--border);
            padding-top: 20px;
            font-size: 12px;
            color: var(--text-muted);
            line-height: 1.7;
        }

        .info-block strong {
            color: var(--text);
        }

        /* ── Main panel ─────────────────────────── */
        .main {
            display: flex;
            flex-direction: column;
            background: var(--bg);
        }

        .log-header {
            padding: 12px 20px 10px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .log-header h2 {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: .8px;
        }

        #log-count {
            font-size: 11px;
            font-weight: 500;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 2px 10px;
            color: var(--text-muted);
        }

        #log-output {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px;
            display: flex;
            flex-direction: column;
            gap: 2px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            line-height: 1.6;
        }

        #log-output::-webkit-scrollbar {
            width: 6px;
        }

        #log-output::-webkit-scrollbar-track {
            background: transparent;
        }

        #log-output::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        .log-entry {
            display: flex;
            gap: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            word-break: break-all;
            white-space: pre-wrap;
            transition: background .1s;
        }

        .log-entry:hover {
            background: var(--surface2);
        }

        .log-time {
            color: var(--text-muted);
            flex-shrink: 0;
            font-size: 11px;
            padding-top: 1px;
        }

        .log-text {
            color: var(--text);
        }

        .log-entry.error .log-text {
            color: #f47f7f;
        }

        .log-entry.warn .log-text {
            color: var(--yellow);
        }

        .log-entry.info .log-text {
            color: var(--text);
        }

        .log-entry.sys .log-text {
            color: var(--accent);
            font-style: italic;
        }

        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: var(--text-muted);
            font-size: 13px;
            font-family: 'Inter', sans-serif;
            pointer-events: none;
        }

        .empty-state .icon {
            font-size: 36px;
            opacity: .4;
        }
    </style>
</head>

<body>

    <!-- Titlebar -->
    <div class="titlebar">
        <div class="titlebar-logo">
            <span class="emoji">🚀</span>
            FiveM Bot Launcher
        </div>
        <div class="titlebar-actions">
            <button class="titlebar-btn" id="btn-minimize" title="Minimizar">─</button>
            <button class="titlebar-btn close" id="btn-close" title="Fechar">✕</button>
        </div>
    </div>

    <!-- App layout -->
    <div class="app">
        <!-- Sidebar -->
        <aside class="sidebar">

            <div class="status-card">
                <span class="status-label">Estado do Bot</span>
                <div class="status-badge">
                    <div class="status-dot" id="status-dot"></div>
                    <span id="status-text">Offline</span>
                </div>
            </div>

            <div class="controls">
                <button class="btn btn-start" id="btn-start">▶ Iniciar Bot</button>
                <button class="btn btn-stop" id="btn-stop" disabled>⏹ Parar Bot</button>
                <button class="btn btn-clear" id="btn-clear">🗑 Limpar Logs</button>
            </div>

            <div class="info-block">
                <strong>bot-cidade/index.js</strong><br />
                Clica em <em>Iniciar Bot</em> para ligar o bot ao Discord.<br /><br />
                Os logs aparecem em tempo real no painel ao lado.
            </div>

        </aside>

        <!-- Log panel -->
        <main class="main">
            <div class="log-header">
                <h2>📋 Logs em tempo real</h2>
                <span id="log-count">0 linhas</span>
            </div>
            <div id="log-output">
                <div class="empty-state" id="empty-state">
                    <span class="icon">🤖</span>
                    <span>Inicia o bot para ver os logs aqui.</span>
                </div>
            </div>
        </main>
    </div>

    <script>
        const btnStart = document.getElementById('btn-start');
        const btnStop = document.getElementById('btn-stop');
        const btnClear = document.getElementById('btn-clear');
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');
        const logOutput = document.getElementById('log-output');
        const emptyState = document.getElementById('empty-state');
        const logCount = document.getElementById('log-count');

        let lineCount = 0;

        // Titlebar
        document.getElementById('btn-minimize').addEventListener('click', () => window.botAPI.minimize());
        document.getElementById('btn-close').addEventListener('click', () => window.botAPI.close());

        function addLog(type, text) {
            // Remove empty state
            if (emptyState.parentNode) emptyState.remove();

            const lines = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n').split('\n');
            lines.forEach(line => {
                if (!line.trim()) return;
                lineCount++;

                const now = new Date();
                const time = now.toLocaleTimeString('pt-PT', { hour12: false });

                const entry = document.createElement('div');
                entry.className = `log-entry ${type}`;

                const t = document.createElement('span');
                t.className = 'log-time';
                t.textContent = time;

                const m = document.createElement('span');
                m.className = 'log-text';
                m.textContent = line;

                entry.appendChild(t);
                entry.appendChild(m);
                logOutput.appendChild(entry);
            });

            logCount.textContent = `${lineCount} linha${lineCount !== 1 ? 's' : ''}`;
            logOutput.scrollTop = logOutput.scrollHeight;
        }

        function setStatus(status) {
            if (status === 'online') {
                statusDot.classList.add('online');
                statusText.textContent = 'Online ✓';
                btnStart.disabled = true;
                btnStop.disabled = false;
                addLog('sys', '🟢 Bot iniciado com sucesso.');
            } else {
                statusDot.classList.remove('online');
                statusText.textContent = 'Offline';
                btnStart.disabled = false;
                btnStop.disabled = true;
                addLog('sys', '🔴 Bot parado.');
            }
        }

        // Start / Stop
        btnStart.addEventListener('click', () => {
            btnStart.disabled = true;
            addLog('sys', '⏳ A iniciar o bot...');
            window.botAPI.startBot();
        });

        btnStop.addEventListener('click', () => {
            btnStop.disabled = true;
            window.botAPI.stopBot();
        });

        // Clear
        btnClear.addEventListener('click', () => {
            logOutput.innerHTML = '';
            lineCount = 0;
            logCount.textContent = '0 linhas';
        });

        // Listeners from main process
        window.botAPI.onLog((data) => addLog(data.type, data.text));
        window.botAPI.onStatus((s) => setStatus(s));
    </script>
</body>

</html>
